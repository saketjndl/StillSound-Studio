<!DOCTYPE html>
<html>

<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 220px;
      background: #111113;
      color: #e8e6e3;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 12px;
      padding: 12px;
      -webkit-font-smoothing: antialiased;
    }

    .head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .head-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4a4845;
      transition: all 0.3s;
    }

    .head-dot.on {
      background: #2fcc6b;
      box-shadow: 0 0 5px rgba(47, 204, 107, 0.4);
    }

    .head-name {
      font-weight: 600;
      font-size: 12px;
      color: #888580;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      font-size: 11px;
    }

    .row+.row {
      border-top: 1px solid #242426;
    }

    .row-label {
      color: #888580;
    }

    .pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .pill.ok {
      background: rgba(47, 204, 107, 0.12);
      color: #2fcc6b;
    }

    .pill.off {
      background: rgba(74, 72, 69, 0.2);
      color: #4a4845;
    }

    .pill.active {
      background: rgba(255, 76, 0, 0.12);
      color: #ff4c00;
    }

    .cta {
      display: block;
      text-align: center;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #242426;
      font-size: 10px;
      color: #888580;
    }

    .cta a {
      color: #ff4c00;
      text-decoration: none;
      font-weight: 600;
    }

    .cta a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="head">
    <div class="head-dot" id="dot"></div>
    <span class="head-name">StillSound</span>
  </div>

  <div class="row">
    <span class="row-label">App</span>
    <span class="pill off" id="app-pill">connecting</span>
  </div>
  <div class="row">
    <span class="row-label">YouTube</span>
    <span class="pill off" id="yt-pill">idle</span>
  </div>

  <div class="cta">
    <a href="https://github.com/saketjndl/StillSound-Studio" target="_blank">★ Star on GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
