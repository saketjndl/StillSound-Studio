<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      background: #000000;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    
    .ambient-bg {
      position: fixed;
      top: -50px;
      left: -50px;
      width: calc(100% + 100px);
      height: calc(100% + 100px);
      object-fit: cover;
      filter: blur(50px) saturate(1.5);
      opacity: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 1.5s ease;
    }
    
    .ambient-bg.playing {
      opacity: 0.35;
      animation: ambient-pulse 5s infinite alternate ease-in-out;
    }
    
    @keyframes ambient-pulse {
      0% { transform: scale(1); opacity: 0.2; }
      100% { transform: scale(1.1); opacity: 0.45; }
    }

    /* === DYNAMIC ISLAND CONTAINER === */
    .island {
      background: rgba(0, 0, 0, 0.4);
      padding: 6px;
      position: relative;
      z-index: 1;
      animation: islandAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes islandAppear {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* === MUSIC SECTION (Hero) === */
    .music-section {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 28px;
      background: #1c1c1e;
      position: relative;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .music-section.playing {
      background: linear-gradient(135deg, #1c1c1e 0%, #1a1410 100%);
    }

    /* Subtle ambient glow behind album art when playing */
    .music-section::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255, 76, 0, 0);
      filter: blur(20px);
      transition: background 0.6s ease;
      pointer-events: none;
      z-index: 0;
    }

    .music-section.playing::before {
      background: rgba(255, 76, 0, 0.15);
    }

    /* Album Art */
    .album-art-wrap {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      background: #2c2c2e;
    }

    .album-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: 12px;
    }

    .album-art.loaded {
      display: block;
      animation: artFadeIn 0.3s ease both;
    }

    @keyframes artFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .art-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2c2c2e;
      border-radius: 12px;
    }

    .art-placeholder svg {
      width: 22px;
      height: 22px;
      opacity: 0.3;
    }

    .album-art.loaded + .art-placeholder {
      display: none;
    }

    /* Track Info */
    .track-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .track-name {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .track-artist {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      margin-top: 2px;
    }

    /* Waveform Visualizer */
    .waveform {
      display: flex;
      align-items: center;
      gap: 2.5px;
      height: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      padding-right: 2px;
    }

    .waveform span {
      display: block;
      width: 3px;
      height: 4px;
      background: #4a4845;
      border-radius: 1.5px;
      transition: background 0.3s ease;
    }

    .waveform.active span {
      background: #ff4c00;
    }

    .waveform.active span:nth-child(1) {
      animation: wave 1.0s ease-in-out -0.4s infinite;
    }
    .waveform.active span:nth-child(2) {
      animation: wave 1.0s ease-in-out -0.2s infinite;
    }
    .waveform.active span:nth-child(3) {
      animation: wave 1.0s ease-in-out 0s infinite;
    }
    .waveform.active span:nth-child(4) {
      animation: wave 1.0s ease-in-out -0.3s infinite;
    }
    .waveform.active span:nth-child(5) {
      animation: wave 1.0s ease-in-out -0.1s infinite;
    }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 18px; }
    }

    /* === STATUS SECTION === */
    .status-section {
      padding: 10px 18px 6px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .status-row + .status-row {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a3a3c;
      transition: all 0.4s ease;
      flex-shrink: 0;
    }

    .status-dot.green {
      background: #2fcc6b;
      box-shadow: 0 0 8px rgba(47, 204, 107, 0.5);
    }

    .status-dot.orange {
      background: #ff4c00;
      box-shadow: 0 0 8px rgba(255, 76, 0, 0.5);
    }

    .status-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
    }

    .status-pill {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.02em;
      transition: all 0.3s ease;
    }

    .status-pill.off {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.3);
    }

    .status-pill.ok {
      background: rgba(47, 204, 107, 0.15);
      color: #2fcc6b;
    }

    .status-pill.active {
      background: rgba(255, 76, 0, 0.15);
      color: #ff4c00;
    }

    /* === FOOTER === */
    .island-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px 14px;
    }

    .island-footer a {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.2);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .island-footer a:hover {
      color: #ff4c00;
    }

    /* === CONNECTED GLOW RING === */
    .island.connected .music-section {
      box-shadow: 0 0 0 1px rgba(47, 204, 107, 0.1);
    }

    /* === PLAYBACK CONTROLS === */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 18px 2px;
    }

    .ctrl-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.2s ease;
      padding: 0;
    }

    .ctrl-btn:hover {
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.06);
    }

    .ctrl-btn:active {
      transform: scale(0.88);
    }

    .ctrl-btn.play-pause {
      width: 42px;
      height: 42px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .ctrl-btn.play-pause:hover {
      background: rgba(255, 76, 0, 0.2);
      color: #ff4c00;
    }

    .ctrl-btn svg {
      width: 18px;
      height: 18px;
    }

    .ctrl-btn.play-pause svg {
      width: 20px;
      height: 20px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .ctrl-btn.play-pause svg.hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
    }

    .ctrl-btn.play-pause svg.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* === SCROLLING TEXT FOR LONG NAMES === */
    .track-name.scrolling,
    .track-artist.scrolling {
      animation: textScroll 8s linear infinite;
    }

    @keyframes textScroll {
      0% { transform: translateX(0); }
      10% { transform: translateX(0); }
      45% { transform: translateX(calc(-100% + 140px)); }
      55% { transform: translateX(calc(-100% + 140px)); }
      90% { transform: translateX(0); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>
  <img id="ambient-bg" class="ambient-bg" src="" alt="" />
  <div class="island" id="island">

    <!-- Music Hero Section -->
    <div class="music-section" id="music-section">
      <div class="album-art-wrap">
        <img class="album-art" id="album-art" src="" alt="" />
        <div class="art-placeholder" id="art-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
      </div>
      <div class="track-info">
        <div class="track-name" id="track-name">Not Playing</div>
        <div class="track-artist" id="track-artist">Open Spotify to see your music</div>
      </div>
      <div class="waveform" id="waveform">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Playback Controls -->
    <div class="controls" id="controls">
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="btn-play-pause" title="Play/Pause">
        <svg viewBox="0 0 24 24" fill="currentColor" id="icon-play" class="visible"><path d="M8 5v14l11-7z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor" id="icon-pause" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <!-- Status Rows -->
    <div class="status-section">
      <div class="status-row">
        <div class="status-left">
          <div class="status-dot" id="app-dot"></div>
          <span class="status-label">App</span>
        </div>
        <span class="status-pill off" id="app-pill">connecting</span>
      </div>
      <div class="status-row">
        <div class="status-left">
          <div class="status-dot" id="yt-dot"></div>
          <span class="status-label">Video Sync</span>
        </div>
        <span class="status-pill off" id="yt-pill">idle</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="island-footer">
      <a href="https://github.com/saketjndl/StillSound-Studio" target="_blank">&#9733; Star on GitHub</a>
    </div>

  </div>

  <script src="popup.js"></script>
</body>

</html>
